name: Build_SpaceXit_V4_Final
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git lua5.3 liblua5.3-dev
          git clone --recursive https://github.com/theos/theos.git ~/theos

      - name: Baixar SDK (Sem Erro 295k)
        run: |
          mkdir -p ~/theos/sdks
          # Usando link direto do repositório oficial para evitar bloqueio
          curl -kL "https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz" -o ~/sdk.tar.xz
          # Verifica se o arquivo tem tamanho real (maior que 1MB) antes de extrair
          if [ $(stat -c%s ~/sdk.tar.xz) -lt 1000000 ]; then echo "Erro: SDK corrompido (295k)!"; exit 1; fi
          tar -xf ~/sdk.tar.xz -C ~/theos/sdks/

      - name: Compile Space Xit
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          find . -type f -exec sed -i 's/\r$//' {} +
          make clean
          make package FINALPACKAGE=1

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SpaceXit_V4_Release
          path: packages/*.deb
