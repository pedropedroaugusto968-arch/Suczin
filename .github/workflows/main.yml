name: Build_SpaceXit_V4_Completo
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Instalar Ferramentas de Pacote (O QUE FALTAVA)
        run: |
          sudo apt-get update
          # O dpkg e o ldid são essenciais para gerar o arquivo .deb
          sudo apt-get install -y build-essential git lua5.3 liblua5.3-dev dpkg-dev
          # Baixando o ldid oficial para assinar a dylib
          sudo curl -L https://github.com/theos/ldid/releases/latest/download/ldid_linux_x86_64 -o /usr/local/bin/ldid
          sudo chmod +x /usr/local/bin/ldid

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos

      - name: Clonar SDK (Bypass 295k)
        run: |
          mkdir -p ~/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git ~/temp_sdks
          cp -r ~/temp_sdks/iPhoneOS14.5.sdk ~/theos/sdks/
          rm -rf ~/temp_sdks

      - name: Compilar V4 Final
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          # Garante que o script ignore erros bobos de texto
          find . -type f -exec sed -i 's/\r$//' {} +
          make clean package FINALPACKAGE=1

      - name: Entrega do Produto
        uses: actions/upload-artifact@v4
        with:
          name: SpaceXit_V4_Pronta
          path: packages/*.deb
