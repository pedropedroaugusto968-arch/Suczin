name: Build Space Xit V4 Final

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Preparar Ambiente
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git lua5.3 liblua5.3-dev libarchive-dev python3
          git clone --recursive https://github.com/theos/theos.git ~/theos

      - name: Instalar SDK (Método Clone - Sem Erro de Tar)
        run: |
          # Clonando o SDK direto para evitar erro de descompactação
          git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

      - name: Limpar Arquivos (Anti-Erro de Formato)
        run: |
          find . -type f -exec sed -i 's/\r$//' {} +
          echo "" >> control

      - name: Compilar Space Xit V4
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          make clean
          make package FINALPACKAGE=1

      - name: Entrega do Arquivo
        uses: actions/upload-artifact@v4
        with:
          name: SpaceXit_V4_Final
          path: packages/*.deb
