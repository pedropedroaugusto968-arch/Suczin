name: Build_SpaceXit_V4
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git lua5.3 liblua5.3-dev
          git clone --recursive https://github.com/theos/theos.git ~/theos
          curl -kL "https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz" -o ~/sdk.tar.xz
          mkdir -p ~/theos/sdks
          tar -xf ~/sdk.tar.xz -C ~/theos/sdks/

      - name: Compile
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          find . -type f -exec sed -i 's/\r$//' {} +
          make clean
          make package FINALPACKAGE=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpaceXit_V4_Release
          path: packages/*.deb
